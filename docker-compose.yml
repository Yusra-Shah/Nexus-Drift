version: "3.9"

networks:
  nexusdrift-network:
    driver: bridge

volumes:
  neo4j-data:
  redis-data:

services:
  api:
    build:
      context: services/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SERVICE_NAME=nexusdrift-api
      - NEO4J_URI=bolt://neo4j-local:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      neo4j-local:
        condition: service_healthy
      redis-local:
        condition: service_started
    networks:
      - nexusdrift-network
    volumes:
      - ./shared:/app/shared
    restart: unless-stopped

  neo4j-local:
    image: neo4j:5.18-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusdrift-network

  redis-local:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nexusdrift-network
    restart: unless-stopped

  reasoning:
    build:
      context: services/reasoning
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - SERVICE_NAME=nexusdrift-reasoning
      - NEO4J_URI=bolt://neo4j-local:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      neo4j-local:
        condition: service_healthy
    networks:
      - nexusdrift-network
    volumes:
      - ./shared:/app/shared
    restart: unless-stopped

  watchtower:
    build:
      context: services/watchtower
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - SERVICE_NAME=nexusdrift-watchtower
      - NEO4J_URI=bolt://neo4j-local:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      neo4j-local:
        condition: service_healthy
    networks:
      - nexusdrift-network
    volumes:
      - ./shared:/app/shared
    restart: unless-stopped
