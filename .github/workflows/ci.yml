name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.0

      - name: Run ruff
        run: ruff check services/ shared/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            pytest==8.2.0 \
            pytest-asyncio==0.23.0 \
            pytest-cov \
            pydantic==2.7.0 \
            pydantic-settings==2.3.0 \
            fastapi==0.115.0 \
            httpx==0.27.0 \
            slowapi==0.1.9 \
            python-jose[cryptography]==3.3.0 \
            python-multipart==0.0.9

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest services/ \
            --tb=short \
            -q \
            --cov=services \
            --cov=shared \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (verify compile)
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: false
          tags: nexusdrift/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
